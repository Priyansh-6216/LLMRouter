spring:
  application:
    name: llmrouter

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:llmrouter}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8080}

openai:
  api:
    key: ${OPENAI_API_KEY:}
    url: ${OPENAI_API_URL:https://api.openai.com/v1}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
    url: ${ANTHROPIC_API_URL:https://api.anthropic.com/v1}

vllm:
  api:
    key: ${VLLM_API_KEY:}
    url: ${VLLM_BASE_URL:http://localhost:8000/v1}
    model: ${VLLM_MODEL_NAME:meta-llama/Llama-3-8B-Instruct}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      openai:
        baseConfig: default
      anthropic:
        baseConfig: default
      vllm:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 2
        waitDuration: 500ms
    instances:
      openai:
        baseConfig: default
      anthropic:
        baseConfig: default
      vllm:
        baseConfig: default
