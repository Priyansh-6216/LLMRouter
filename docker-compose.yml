version: '3.9'

services:

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: llmrouter-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmrouter}
      POSTGRES_USER: ${POSTGRES_USER:-llmrouter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmrouter_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmrouter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llmrouter-net

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: llmrouter-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llmrouter-net

  # ──────────────────────────────────────────────
  # Kafka + Zookeeper
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: llmrouter-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - llmrouter-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: llmrouter-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - llmrouter-net

  # Kafka UI (optional — useful for dev)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: llmrouter-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - llmrouter-net

  # ──────────────────────────────────────────────
  # LLMRouter API (Spring Boot)
  # ──────────────────────────────────────────────
  llmrouter-api:
    build:
      context: ./llmrouter-api
      dockerfile: Dockerfile
    container_name: llmrouter-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-llmrouter}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-llmrouter}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-llmrouter_secret}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      VLLM_MODEL_NAME: ${VLLM_MODEL_NAME:-}
    networks:
      - llmrouter-net
    profiles:
      - full  # only start with: docker compose --profile full up

  # ──────────────────────────────────────────────
  # Prometheus (optional observability)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: llmrouter-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - llmrouter-net
    profiles:
      - observability

  # ──────────────────────────────────────────────
  # Grafana (optional observability)
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: llmrouter-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - llmrouter-net
    profiles:
      - observability

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  llmrouter-net:
    driver: bridge
